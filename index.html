<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>무주산골영화제 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { min-height:100vh; background:linear-gradient(180deg,#1a2e1a 0%,#243024 40%,#1c2a1c 100%); font-family:'Noto Sans KR',sans-serif; color:#e8e0d4; }
button { font-family:inherit; cursor:pointer; border:none; }
input,select { font-family:inherit; }
.serif { font-family:'Nanum Myeongjo',serif; }

/* Scrollbar */
::-webkit-scrollbar { height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(129,178,154,0.2); border-radius:4px; }

/* Loading overlay */
.loading-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:999;
  backdrop-filter:blur(4px);
}
.loading-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#81B29A; margin:0 4px; animation:bounce 1.2s infinite; }
.loading-dot:nth-child(2) { animation-delay:0.2s; }
.loading-dot:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-12px)} }

/* Modal backdrop */
.modal-backdrop {
  position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:flex-end; justify-content:center;
  z-index:200; backdrop-filter:blur(4px);
}
.modal-center { align-items:center; }
.modal-panel {
  background:linear-gradient(180deg,#2d3b2d,#1f2b1f); border-radius:20px 20px 0 0; padding:24px; width:100%; max-width:460px;
  max-height:80vh; overflow-y:auto; border:1px solid rgba(129,178,154,0.1); border-bottom:none;
}
.modal-panel-center { border-radius:20px; border-bottom:1px solid rgba(129,178,154,0.1); }

.input {
  width:100%; padding:11px 14px; border-radius:10px; border:1px solid rgba(129,178,154,0.2);
  background:rgba(26,46,26,0.8); color:#e8e0d4; font-size:15px; outline:none;
}
.btn-primary { padding:12px; border-radius:12px; background:#588157; color:#fff; font-size:15px; font-weight:600; width:100%; }
.btn-primary:disabled { background:#3d4a3d; color:#4a5a4a; cursor:default; }
.btn-ghost { padding:12px; border-radius:12px; border:1px solid rgba(129,178,154,0.1); background:transparent; color:#6B705C; font-size:15px; }

.tag { font-size:11px; padding:2px 8px; border-radius:6px; font-weight:600; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const MEMBERS = ["지혜","희윤","범규","재민","지은","승재","수민","영태","지윤","혜윤","치승","성주","옥"];
const DATES = ["2026-06-06","2026-06-07"];
const DATE_LABELS = {"2026-06-06":"6/6 (토)","2026-06-07":"6/7 (일)"};
const HOURS = Array.from({length:18},(_,i)=>i+5);
const PASTEL = ["#F4A0A0","#F4C7A0","#E8D57E","#A0D9A0","#A0D4D9","#A0B4F4","#C7A0F4","#F4A0D9","#D4BFA0","#8FD4C1","#B0C4F4","#F0C4A0","#D4A0C7"];
const PASTEL_TEXT = ["#8B3030","#8B5A30","#6B5A10","#2D6B2D","#2D6060","#2D3D8B","#5A2D8B","#8B2D60","#6B5030","#2D6B55","#3D4D8B","#7A5530","#6B2D55"];

const CATEGORIES = {
  "영화":{color:"#E07A5F",bg:"rgba(224,122,95,0.12)"},
  "등나무":{color:"#9B8EC4",bg:"rgba(155,142,196,0.12)"},
  "식사":{color:"#F2CC8F",bg:"rgba(242,204,143,0.12)"},
  "이동":{color:"#81B29A",bg:"rgba(129,178,154,0.12)"},
  "자유시간":{color:"#588157",bg:"rgba(88,129,87,0.12)"},
  "기타":{color:"#B5838D",bg:"rgba(181,131,141,0.12)"}
};
const CAT_KEYS = Object.keys(CATEGORIES);
const TRANSPORT = ["자차","카풀","고속버스","셔틀버스"];
const TICKET_TYPES = ["양도 받았어요","양도 했어요","양도 가능해요"];
const TICKET_COLORS = {"양도 받았어요":"#81B29A","양도 했어요":"#F2CC8F","양도 가능해요":"#E07A5F"};
const AP_START = [18,19,20,21,22,23];
const AP_END = [0,1,2,3,4,5,6];
const ROOMS = [{room:"203호",members:[]},{room:"204호",members:[]},{room:"305호",members:[]},{room:"306호",members:[]}];

const API = "https://script.google.com/macros/s/AKfycbxuKNlF3-TXzatrsVr2cPHUviBEYRM4YGSvgolYkGh_F2ejC-kiLSj7CaBUKmC0tJDUbg/exec";

// State
let schedules = {};
let tickets = [];
let loggedInAs = null;
let selectedMember = null;
let viewMode = "individual";
let selectedDate = DATES[0];
let saving = false;
let page = "login"; // login | main | notice

const $ = document.getElementById.bind(document);
const app = document.getElementById("app");

// API
async function api(action, extra={}) {
  const params = new URLSearchParams({action, ...extra});
  const r = await fetch(`${API}?${params.toString()}`);
  return r.json();
}

function groupByMember(rows) {
  const g = {};
  (rows||[]).forEach(r => { if(!r.member) return; if(!g[r.member]) g[r.member]=[]; g[r.member].push(r); });
  return g;
}

async function loadAll() {
  showLoading(true);
  try {
    const [s,t] = await Promise.all([api("getSchedules"), api("getTickets")]);
    if(s) schedules = groupByMember(s);
    if(t) tickets = Array.isArray(t) ? t : [];
  } catch(e) { console.error(e); }
  showLoading(false);
  render();
}

async function apiAdd(type, data) {
  showLoading(true);
  await api(type === "schedule" ? "addSchedule" : "addTicket", {data:JSON.stringify(data)});
  await loadAll();
}

async function apiDelete(type, id) {
  showLoading(true);
  await api(type === "schedule" ? "deleteSchedule" : "deleteTicket", {id});
  await loadAll();
}

async function apiUpdate(data) {
  showLoading(true);
  await api("updateSchedule", {data:JSON.stringify(data)});
  await loadAll();
}

function showLoading(show) {
  saving = show;
  let el = document.getElementById("loading-overlay");
  if(show) {
    if(!el) { el = document.createElement("div"); el.id="loading-overlay"; el.className="loading-overlay"; el.innerHTML='<div><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>'; document.body.appendChild(el); }
  } else { if(el) el.remove(); }
}

function fmt(h,m) { return `${String(h).padStart(2,"0")}:${String(m||0).padStart(2,"0")}`; }
function parseT(s) { const [h,m]=(s||"0:0").split(":").map(Number); return {h,m}; }

function getMemberItems(member, date) {
  return (schedules[member]||[]).filter(i=>i.date===date).sort((a,b)=>String(a.start).localeCompare(String(b.start)));
}

function getHourSummary(date, hour) {
  const results = [];
  MEMBERS.forEach((member,idx) => {
    const items = (schedules[member]||[]).filter(i => {
      if(i.date!==date) return false;
      const s=parseT(i.start), e=parseT(i.end);
      return (s.h*60+s.m)<(hour+1)*60 && (e.h*60+e.m)>hour*60;
    });
    if(items.length>0) results.push({member,items,color:PASTEL[idx]});
  });
  return results;
}

// ============ RENDER ============
function render() {
  if(page==="notice") return renderNotice();
  if(!loggedInAs) return renderLogin();
  renderMain();
}

function renderLogin() {
  app.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;padding:20px">
      <div style="text-align:center;margin-top:48px;margin-bottom:28px">
        <div style="font-size:11px;letter-spacing:8px;color:#81B29A;font-weight:300;margin-bottom:8px">2026 · 무주</div>
        <h1 class="serif" style="font-size:26px;font-weight:800;color:#e8e0d4;letter-spacing:2px">산골영화제</h1>
        <div style="font-size:12px;color:#6B705C;margin-top:10px;letter-spacing:3px">6.6 — 6.7 스케줄 보드</div>
        <div style="width:60px;height:1px;background:linear-gradient(90deg,transparent,#81B29A,transparent);margin:16px auto 0"></div>
      </div>
      <button onclick="page='notice';render()" style="padding:10px 24px;border-radius:12px;border:1px solid rgba(224,122,95,0.3);background:rgba(224,122,95,0.08);color:#E07A5F;font-size:14px;font-weight:600;margin-bottom:24px;width:100%;max-width:380px">Notice</button>
      <div style="width:100%;max-width:380px">
        <div style="color:#6B705C;font-size:13px;margin-bottom:16px;text-align:center">내 이름을 선택하세요</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
          ${MEMBERS.map((n,i) => {
            const has = (schedules[n]||[]).length > 0;
            return `<button onclick="handleLogin('${n}')" style="padding:14px 8px;border-radius:12px;background:${PASTEL[i]};color:${PASTEL_TEXT[i]};font-size:15px;font-weight:700;position:relative">${n}${has?'<div style="position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:#588157"></div>':''}</button>`;
          }).join("")}
        </div>
      </div>
    </div>`;
}

function handleLogin(name) {
  loggedInAs = name;
  selectedMember = name;
  page = "main";
  const existing = schedules[name] || [];
  const hasAp = existing.some(i => i.title === "뒷풀이" && i.category === "기타");
  render();
  if(!hasAp) showAfterpartyModal();
}

// ============ AFTERPARTY ============
function showAfterpartyModal() {
  let startH = 21, endH = 2;
  const modal = document.createElement("div");
  modal.className = "modal-backdrop modal-center";
  modal.innerHTML = `<div class="modal-panel modal-panel-center" style="max-width:360px;padding:28px" id="ap-panel"></div>`;
  document.body.appendChild(modal);
  renderApAsk();

  function renderApAsk() {
    document.getElementById("ap-panel").innerHTML = `
      <div style="text-align:center;margin-bottom:24px">
        <div class="serif" style="font-size:18px;font-weight:700;color:#e8e0d4;margin-bottom:8px">뒷풀이에 참여하시겠습니까?</div>
        <div style="font-size:13px;color:#6B705C">6/6 저녁 ~ 6/7 새벽</div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="document.getElementById('ap-time').style.display='block'" id="ap-yes" class="btn-primary" style="flex:1;font-size:16px;font-weight:700">참여!</button>
        <button onclick="this.closest('.modal-backdrop').remove()" class="btn-ghost" style="flex:1;font-size:16px;font-weight:600">패스</button>
      </div>`;
    document.getElementById("ap-yes").onclick = renderApTime;
  }

  function renderApTime() {
    document.getElementById("ap-panel").innerHTML = `
      <div class="serif" style="font-size:17px;font-weight:700;color:#e8e0d4;margin-bottom:20px;text-align:center">몇 시부터 몇 시까지?</div>
      <div style="margin-bottom:16px">
        <label style="font-size:12px;color:#6B705C;margin-bottom:6px;display:block">시작 (6/6 저녁)</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap" id="ap-start-btns"></div>
      </div>
      <div style="margin-bottom:20px">
        <label style="font-size:12px;color:#6B705C;margin-bottom:6px;display:block">종료 (6/7 새벽)</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap" id="ap-end-btns"></div>
      </div>
      <div id="ap-summary" style="padding:10px 14px;border-radius:10px;background:rgba(88,129,87,0.1);margin-bottom:16px;font-size:13px;color:#81B29A;text-align:center"></div>
      <div style="display:flex;gap:8px">
        <button class="btn-ghost" style="flex:1" id="ap-back">뒤로</button>
        <button class="btn-primary" style="flex:2" id="ap-submit">등록</button>
      </div>`;

    document.getElementById("ap-back").onclick = renderApAsk;
    document.getElementById("ap-submit").onclick = async () => {
      modal.remove();
      const baseId = Date.now().toString();
      if(endH <= 6) {
        await apiAdd("schedule", {id:baseId+"a",member:loggedInAs,title:"뒷풀이",category:"기타",start:fmt(startH,0),end:"23:59",date:"2026-06-06",detail:""});
        if(endH>0) await apiAdd("schedule", {id:baseId+"b",member:loggedInAs,title:"뒷풀이",category:"기타",start:"00:00",end:fmt(endH,0),date:"2026-06-07",detail:""});
      } else {
        await apiAdd("schedule", {id:baseId+"a",member:loggedInAs,title:"뒷풀이",category:"기타",start:fmt(startH,0),end:fmt(endH,0),date:"2026-06-06",detail:""});
      }
    };

    function renderBtns() {
      document.getElementById("ap-start-btns").innerHTML = AP_START.map(h =>
        `<button style="padding:8px 14px;border-radius:8px;background:${startH===h?'#588157':'rgba(31,43,31,0.6)'};color:${startH===h?'#fff':'#81B29A'};font-size:14px;font-weight:600" data-h="${h}" class="ap-s">${h}시</button>`
      ).join("");
      document.getElementById("ap-end-btns").innerHTML = AP_END.map(h =>
        `<button style="padding:8px 14px;border-radius:8px;background:${endH===h?'#588157':'rgba(31,43,31,0.6)'};color:${endH===h?'#fff':'#81B29A'};font-size:14px;font-weight:600" data-h="${h}" class="ap-e">${h===0?'자정':h+'시'}</button>`
      ).join("");
      document.getElementById("ap-summary").textContent = `6/6 ${startH}시 ~ 6/7 ${endH===0?'자정':endH+'시'}`;
      document.querySelectorAll(".ap-s").forEach(b => b.onclick = () => { startH=+b.dataset.h; renderBtns(); });
      document.querySelectorAll(".ap-e").forEach(b => b.onclick = () => { endH=+b.dataset.h; renderBtns(); });
    }
    renderBtns();
  }
}

// ============ NOTICE ============
function renderNotice() {
  const byType = {};
  TICKET_TYPES.forEach(t => { byType[t] = tickets.filter(x=>x.type===t); });

  app.innerHTML = `
    <div style="padding:14px 20px;border-bottom:1px solid rgba(129,178,154,0.08);display:flex;align-items:center;justify-content:space-between;background:rgba(26,46,26,0.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100">
      <div class="serif" style="font-size:15px;font-weight:700;letter-spacing:1px">Notice</div>
      <button onclick="page=loggedInAs?'main':'login';render()" style="padding:6px 12px;border-radius:8px;border:1px solid rgba(129,178,154,0.12);background:transparent;color:#81B29A;font-size:12px">← 돌아가기</button>
    </div>
    <div style="padding:20px;max-width:480px;margin:0 auto">
      <div style="margin-bottom:32px">
        <h2 class="serif" style="font-size:17px;font-weight:700;color:#A98467;margin-bottom:14px">1. 숙소 배정</h2>
        ${ROOMS.map(r => `
          <div style="background:rgba(31,43,31,0.6);border-radius:12px;padding:12px 16px;border-left:4px solid #A98467;margin-bottom:8px">
            <div style="font-size:14px;font-weight:700;color:#A98467;margin-bottom:4px">${r.room}</div>
            <div style="font-size:14px;color:${r.members.length>0?'#e8e0d4':'#4a5a4a'}">${r.members.length>0?r.members.join(", "):"미정"}</div>
          </div>`).join("")}
      </div>
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <h2 class="serif" style="font-size:17px;font-weight:700;color:#E07A5F">2. 티켓 양도 내역</h2>
          <button onclick="showTicketForm()" style="padding:6px 14px;border-radius:8px;background:#588157;color:#fff;font-size:12px;font-weight:600">+ 추가</button>
        </div>
        <div style="font-size:12px;color:#6B705C;margin-bottom:14px;padding:8px 12px;border-radius:8px;background:rgba(129,178,154,0.06);line-height:1.6">양도자와 피양도자가 표를 주고받은 후에는 항목을 삭제해주세요.</div>
        ${TICKET_TYPES.map(type => {
          const tt = byType[type]||[];
          const c = TICKET_COLORS[type];
          return `<div style="margin-bottom:16px">
            <div style="font-size:13px;font-weight:700;color:${c};margin-bottom:6px">${type}</div>
            ${tt.length===0 ? '<div style="font-size:13px;color:#4a5a4a;padding:6px 0">—</div>' :
              tt.map(t => `<div style="display:flex;align-items:center;justify-content:space-between;background:rgba(31,43,31,0.6);border-radius:10px;padding:10px 14px;border-left:3px solid ${c};margin-bottom:6px">
                <div style="font-size:14px;color:#e8e0d4">${t.movie} <span style="color:#6B705C">(${t.name})</span></div>
                <button onclick="apiDelete('ticket','${t.id}')" style="padding:3px 8px;border-radius:6px;background:rgba(224,122,95,0.1);color:#E07A5F;font-size:11px">삭제</button>
              </div>`).join("")}
          </div>`;
        }).join("")}
      </div>
    </div>`;
}

function showTicketForm() {
  let type=TICKET_TYPES[0], movie="", name="";
  const modal = document.createElement("div");
  modal.className = "modal-backdrop";
  modal.onclick = e => { if(e.target===modal) modal.remove(); };
  modal.innerHTML = `<div class="modal-panel" id="tf-panel"></div>`;
  document.body.appendChild(modal);
  renderTF();

  function renderTF() {
    document.getElementById("tf-panel").innerHTML = `
      <h3 class="serif" style="font-size:17px;font-weight:700;margin-bottom:20px;color:#E07A5F">티켓 양도 등록</h3>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div>
          <label style="font-size:12px;color:#6B705C;margin-bottom:6px;display:block">상태</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${TICKET_TYPES.map(t => `<button class="tf-type" data-t="${t}" style="padding:7px 12px;border-radius:8px;background:${type===t?'rgba(224,122,95,0.2)':'rgba(31,43,31,0.6)'};color:${type===t?'#E07A5F':'#6B705C'};font-size:12px;font-weight:600">${t}</button>`).join("")}
          </div>
        </div>
        <div><label style="font-size:12px;color:#6B705C;margin-bottom:4px;display:block">영화 제목</label><input class="input" id="tf-movie" placeholder="예: 어느 가족" value="${movie}"></div>
        <div><label style="font-size:12px;color:#6B705C;margin-bottom:4px;display:block">이름</label><input class="input" id="tf-name" placeholder="예: 지혜" value="${name}"></div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn-ghost" style="flex:1" onclick="this.closest('.modal-backdrop').remove()">취소</button>
          <button class="btn-primary" style="flex:2" id="tf-submit">등록</button>
        </div>
      </div>`;
    document.querySelectorAll(".tf-type").forEach(b => b.onclick = () => { type=b.dataset.t; renderTF(); });
    document.getElementById("tf-movie").oninput = e => movie=e.target.value;
    document.getElementById("tf-name").oninput = e => name=e.target.value;
    document.getElementById("tf-submit").onclick = async () => {
      if(!movie||!name) return;
      modal.remove();
      await apiAdd("ticket", {id:Date.now().toString(),type,movie,name});
    };
  }
}

// ============ MAIN APP ============
function renderMain() {
  app.innerHTML = `
    <!-- Header -->
    <div style="padding:14px 20px;border-bottom:1px solid rgba(129,178,154,0.08);display:flex;align-items:center;justify-content:space-between;background:rgba(26,46,26,0.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100">
      <div>
        <div class="serif" style="font-size:15px;font-weight:700;letter-spacing:1px">산골영화제</div>
        <div style="font-size:11px;color:#6B705C">${loggedInAs}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button onclick="page='notice';render()" style="padding:6px 10px;border-radius:8px;border:1px solid rgba(224,122,95,0.2);background:transparent;color:#E07A5F;font-size:12px">Notice</button>
        <button onclick="loadAll()" style="padding:6px 10px;border-radius:8px;border:1px solid rgba(129,178,154,0.12);background:transparent;color:#81B29A;font-size:12px">새로고침</button>
        <button onclick="loggedInAs=null;selectedMember=null;page='login';render()" style="padding:6px 10px;border-radius:8px;border:1px solid rgba(224,122,95,0.2);background:transparent;color:#E07A5F;font-size:12px">나가기</button>
      </div>
    </div>

    <!-- Toggles -->
    <div style="padding:12px 20px 0;display:flex;gap:12px;align-items:center;justify-content:space-between">
      <div style="display:flex;gap:4px">
        ${["individual","overview"].map(k => `<button onclick="viewMode='${k}';render()" style="padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;background:${viewMode===k?'rgba(88,129,87,0.25)':'transparent'};color:${viewMode===k?'#81B29A':'#6B705C'}">${k==='individual'?'개인별':'전체보기'}</button>`).join("")}
      </div>
      <div style="display:flex;gap:4px">
        ${DATES.map(d => `<button onclick="selectedDate='${d}';render()" style="padding:7px 14px;border-radius:8px;border:${selectedDate===d?'1px solid rgba(129,178,154,0.3)':'1px solid transparent'};background:${selectedDate===d?'rgba(88,129,87,0.15)':'transparent'};color:${selectedDate===d?'#81B29A':'#6B705C'};font-size:13px;font-weight:600">${DATE_LABELS[d]}</button>`).join("")}
      </div>
    </div>

    <div style="padding:12px 20px 20px" id="main-content"></div>`;

  if(viewMode==="individual") renderIndividual();
  else renderOverview();
}

function renderIndividual() {
  const mc = document.getElementById("main-content");
  mc.innerHTML = `
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:14px;-webkit-overflow-scrolling:touch">
      ${MEMBERS.map((n,i) => {
        const sel = selectedMember===n;
        const cnt = getMemberItems(n,selectedDate).length;
        return `<button onclick="selectedMember='${n}';render()" style="display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;background:${sel?PASTEL[i]:PASTEL[i]+'30'};color:${sel?PASTEL_TEXT[i]:PASTEL[i]};font-size:13px;font-weight:${sel?700:500};white-space:nowrap;flex-shrink:0">${n}${cnt>0?`<span style="background:${sel?PASTEL_TEXT[i]:PASTEL[i]};color:${sel?PASTEL[i]:'#1a2e1a'};border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700">${cnt}</span>`:''}</button>`;
      }).join("")}
    </div>
    <div id="member-schedule"></div>`;

  if(!selectedMember) return;
  const items = getMemberItems(selectedMember, selectedDate);
  const isMe = loggedInAs === selectedMember;
  const idx = MEMBERS.indexOf(selectedMember);
  const ms = document.getElementById("member-schedule");

  ms.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h2 class="serif" style="font-size:17px;font-weight:700;color:${PASTEL[idx]}">${selectedMember}의 스케줄</h2>
      ${isMe ? `<button onclick="showScheduleForm()" style="padding:7px 16px;border-radius:10px;background:#588157;color:#fff;font-size:13px;font-weight:600">+ 추가</button>` : ''}
    </div>
    ${items.length === 0 ?
      '<div style="padding:36px;text-align:center;color:#4a5a4a;background:rgba(31,43,31,0.4);border-radius:14px;border:1px dashed rgba(129,178,154,0.12)">아직 등록된 스케줄이 없어요</div>' :
      items.map(item => {
        const cat = CATEGORIES[item.category] || CATEGORIES["기타"];
        return `<div style="background:rgba(31,43,31,0.6);border-radius:14px;padding:14px 16px;border-left:4px solid ${cat.color};margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div style="font-size:15px;font-weight:600;margin-bottom:5px;color:#e8e0d4">${item.title}</div>
              <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                <span class="tag" style="background:${cat.bg};color:${cat.color}">${item.category}</span>
                <span style="font-size:13px;color:#81B29A;font-weight:500">${item.start} — ${item.end}</span>
              </div>
              ${item.detail ? `<div style="font-size:12px;color:#94a3b8;margin-top:5px">${item.detail}</div>` : ''}
            </div>
            ${isMe ? `<div style="display:flex;gap:4px">
              <button onclick='editSchedule(${JSON.stringify(item).replace(/'/g,"&#39;")})' style="padding:4px 8px;border-radius:6px;background:rgba(129,178,154,0.1);color:#81B29A;font-size:12px">수정</button>
              <button onclick="apiDelete('schedule','${item.id}')" style="padding:4px 8px;border-radius:6px;background:rgba(224,122,95,0.1);color:#E07A5F;font-size:12px">삭제</button>
            </div>` : ''}
          </div>
        </div>`;
      }).join("")}`;
}

function renderOverview() {
  const mc = document.getElementById("main-content");
  mc.innerHTML = HOURS.map(hour => {
    const summary = getHourSummary(selectedDate, hour);
    return `<div style="display:flex;border-bottom:1px solid rgba(129,178,154,0.05);min-height:38px">
      <div style="width:52px;flex-shrink:0;padding:8px 0;font-size:11px;color:#4a5a4a;font-weight:500;text-align:right;padding-right:12px;font-family:monospace">${String(hour).padStart(2,"0")}:00</div>
      <div style="flex:1;padding:5px 0;display:flex;flex-wrap:wrap;gap:4px">
        ${summary.map(({member,items,color}) =>
          `<div onclick="selectedMember='${member}';viewMode='individual';render()" style="padding:3px 10px;border-radius:8px;background:${color}35;font-size:12px;color:${color};font-weight:600;cursor:pointer">${member} · ${items.map(i=>i.title).join(", ")}</div>`
        ).join("")}
      </div>
    </div>`;
  }).join("");
}

// ============ SCHEDULE FORM ============
function showScheduleForm(editItem) {
  let cat = editItem?.category || CAT_KEYS[0];
  let title = editItem?.title || "";
  let detail = editItem?.detail || "";
  let date = editItem?.date || selectedDate;
  let sH = editItem ? parseT(editItem.start).h : 10;
  let sM = editItem ? parseT(editItem.start).m : 0;
  let eH = editItem ? parseT(editItem.end).h : 12;
  let eM = editItem ? parseT(editItem.end).m : 0;

  const modal = document.createElement("div");
  modal.className = "modal-backdrop";
  modal.onclick = e => { if(e.target===modal) modal.remove(); };
  modal.innerHTML = `<div class="modal-panel" id="sf-panel"></div>`;
  document.body.appendChild(modal);
  renderSF();

  function isValid() { return title && (["영화","식사","이동","등나무"].includes(cat) ? !!detail : true); }

  function getPlaceholder() {
    return {영화:"예: 어느 가족",등나무:"예: 야외상영",식사:"예: 점심",이동:"예: 서울→무주"}[cat]||"예: 산책";
  }

  function renderSF() {
    const v = isValid();
    document.getElementById("sf-panel").innerHTML = `
      <h3 class="serif" style="font-size:17px;font-weight:700;margin-bottom:20px;color:#81B29A">${editItem?"스케줄 수정":"스케줄 추가"}</h3>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div>
          <label style="font-size:12px;color:#6B705C;margin-bottom:6px;display:block">카테고리</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${CAT_KEYS.map(c => `<button class="sf-cat" data-c="${c}" style="padding:6px 12px;border-radius:8px;border:${cat===c?'1px solid '+CATEGORIES[c].color+'55':'1px solid rgba(129,178,154,0.08)'};background:${cat===c?CATEGORIES[c].bg:'transparent'};color:${cat===c?CATEGORIES[c].color:'#6B705C'};font-size:12px;font-weight:600">${c}</button>`).join("")}
          </div>
        </div>
        <div><label style="font-size:12px;color:#6B705C;margin-bottom:4px;display:block">제목</label><input class="input" id="sf-title" placeholder="${getPlaceholder()}" value="${title}"></div>
        ${cat==="영화"?`<div><label style="font-size:12px;color:#E07A5F;margin-bottom:4px;display:block">장소 (필수)</label><input class="input" id="sf-detail" placeholder="예: 무주군민의집" value="${detail}" style="border-color:${detail?'rgba(129,178,154,0.2)':'rgba(224,122,95,0.4)'}"></div>`:''}
        ${cat==="등나무"?`<div><label style="font-size:12px;color:#9B8EC4;margin-bottom:4px;display:block">프로그램 (필수)</label><input class="input" id="sf-detail" placeholder="예: 콘서트" value="${detail}" style="border-color:${detail?'rgba(129,178,154,0.2)':'rgba(155,142,196,0.4)'}"></div>`:''}
        ${cat==="식사"?`<div><label style="font-size:12px;color:#F2CC8F;margin-bottom:4px;display:block">어디에서? (필수)</label><input class="input" id="sf-detail" placeholder="예: 미정" value="${detail}" style="border-color:${detail?'rgba(129,178,154,0.2)':'rgba(242,204,143,0.4)'}"></div>`:''}
        ${cat==="이동"?`<div><label style="font-size:12px;color:#81B29A;margin-bottom:6px;display:block">어떻게? (필수)</label><div style="display:flex;gap:6px;flex-wrap:wrap">${TRANSPORT.map(o=>`<button class="sf-tr" data-o="${o}" style="padding:8px 14px;border-radius:8px;background:${detail===o?'rgba(129,178,154,0.25)':'rgba(31,43,31,0.6)'};color:${detail===o?'#81B29A':'#6B705C'};font-size:13px;font-weight:600">${o}</button>`).join("")}</div></div>`:''}
        <div>
          <label style="font-size:12px;color:#6B705C;margin-bottom:4px;display:block">날짜</label>
          <div style="display:flex;gap:8px">
            ${DATES.map(d => `<button class="sf-date" data-d="${d}" style="padding:8px 18px;border-radius:8px;border:${date===d?'1px solid rgba(129,178,154,0.3)':'1px solid rgba(129,178,154,0.08)'};background:${date===d?'rgba(88,129,87,0.15)':'transparent'};color:${date===d?'#81B29A':'#6B705C'};font-size:13px;font-weight:600">${DATE_LABELS[d]}</button>`).join("")}
          </div>
        </div>
        <div style="display:flex;gap:12px">
          <div style="flex:1"><label style="font-size:12px;color:#6B705C;margin-bottom:4px;display:block">시작</label><div style="display:flex;gap:6px"><select class="input" id="sf-sh" style="padding:8px">${HOURS.map(h=>`<option value="${h}" ${sH===h?'selected':''}>${String(h).padStart(2,"0")}시</option>`).join("")}</select><select class="input" id="sf-sm" style="padding:8px">${[0,15,30,45].map(m=>`<option value="${m}" ${sM===m?'selected':''}>${String(m).padStart(2,"0")}분</option>`).join("")}</select></div></div>
          <div style="flex:1"><label style="font-size:12px;color:#6B705C;margin-bottom:4px;display:block">종료</label><div style="display:flex;gap:6px"><select class="input" id="sf-eh" style="padding:8px">${HOURS.map(h=>`<option value="${h}" ${eH===h?'selected':''}>${String(h).padStart(2,"0")}시</option>`).join("")}</select><select class="input" id="sf-em" style="padding:8px">${[0,15,30,45].map(m=>`<option value="${m}" ${eM===m?'selected':''}>${String(m).padStart(2,"0")}분</option>`).join("")}</select></div></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn-ghost" style="flex:1" onclick="this.closest('.modal-backdrop').remove()">취소</button>
          <button class="btn-primary" style="flex:2" id="sf-submit" ${v?'':'disabled'}>${editItem?'수정 완료':'추가하기'}</button>
        </div>
      </div>`;

    // Events
    document.querySelectorAll(".sf-cat").forEach(b => b.onclick = () => { cat=b.dataset.c; detail=""; renderSF(); });
    document.getElementById("sf-title").oninput = e => { title=e.target.value; document.getElementById("sf-submit").disabled=!isValid(); };
    const detailEl = document.getElementById("sf-detail");
    if(detailEl) detailEl.oninput = e => { detail=e.target.value; document.getElementById("sf-submit").disabled=!isValid(); };
    document.querySelectorAll(".sf-tr").forEach(b => b.onclick = () => { detail=b.dataset.o; renderSF(); });
    document.querySelectorAll(".sf-date").forEach(b => b.onclick = () => { date=b.dataset.d; renderSF(); });
    document.getElementById("sf-sh").onchange = e => sH=+e.target.value;
    document.getElementById("sf-sm").onchange = e => sM=+e.target.value;
    document.getElementById("sf-eh").onchange = e => eH=+e.target.value;
    document.getElementById("sf-em").onchange = e => eM=+e.target.value;

    document.getElementById("sf-submit").onclick = async () => {
      if(!isValid()) return;
      modal.remove();
      const data = {id:editItem?.id||Date.now().toString(), member:loggedInAs, title, category:cat, start:fmt(sH,sM), end:fmt(eH,eM), date, detail:detail||""};
      if(editItem) await apiUpdate(data);
      else await apiAdd("schedule", data);
    };
  }
}

function editSchedule(item) {
  showScheduleForm(item);
}

// Init
loadAll();
</script>
</body>
</html>
